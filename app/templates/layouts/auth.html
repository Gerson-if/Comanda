{% extends "base.html" %}
{% block body_class %}theme-chili{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-panel">
    <div class="text-center mb-4">
      <div class="brand-mark mx-auto"><i class="bi bi-egg-fried text-white"></i></div>
      <h3 class="font-display m-0 mt-2" style="font-size: 1.35rem;">{% block auth_title %}{% endblock %}</h3>
      <p class="text-muted-custom small mt-1">{% block auth_subtitle %}{% endblock %}</p>
    </div>

    {% block auth_content %}{% endblock %}
  </div>
</div>
{% endblock %}
