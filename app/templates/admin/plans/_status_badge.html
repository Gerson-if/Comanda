<span id="plan-status-{{ plan.id }}" class="status-badge {{ 'status-active' if plan.is_active else 'status-suspended' }}"
      style="cursor: pointer;" title="Clique para ativar/desativar"
      hx-post="{{ url_for('admin.plans_toggle', plan_id=plan.id) }}"
      hx-target="this" hx-swap="outerHTML">
  {{ 'Ativo' if plan.is_active else 'Inativo' }}
</span>
